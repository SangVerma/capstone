
name: AI Release Manager Test Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'release_manager/**'  # Triggers only when code in this folder changes
      - 'requirements.txt'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Agent Mock Test
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # This runs your main.py in mock mode to verify the logic
          python3 -m release_manager.main --mode mock --pr 42 --inject-failures
