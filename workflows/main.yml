
name: AI Release Manager Test Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - '*.py'  # Triggers when Python files change
      - 'requirements.txt'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install langgraph langgraph-checkpoint pytest requests

      - name: Run Agent Mock Test
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # This runs your multi-agent pipeline
          python3 cicd_agent.py
