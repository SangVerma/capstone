name: Capstone Agents Pipeline

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      repo:
        description: 'Repository name'
        default: 'SangVerma/capstone'
      pr:
        description: 'Pull request number'
        default: '101'
  schedule:
    # Daily at 2:30 PM PST (which is 21:30 UTC)
    - cron: '30 21 * * *'

jobs:
  cicd_agent:
    if: contains(['pull_request', 'workflow_dispatch'], github.event_name)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run CI/CD Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 cicd_agent.py --repo ${{ github.event_name == 'pull_request' && github.repository || github.event.inputs.repo }} --pr ${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.event.inputs.pr }}

  job_search_agent:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Job Search Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 job_search_agent.py